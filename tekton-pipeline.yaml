apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: quarkus-build-push-gitops
  namespace: desafio-tam
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  params:
    - name: git-url
      type: string
    - name: git-revision
      type: string
    - name: app-name
      type: string
    - name: image-tag
      type: string
      default: 1.0.0-SNAPSHOT
    - name: image-registry
      type: string
      default: image-registry.openshift-image-registry.svc:5000
    - name: image-namespace
      type: string
      default: desafio-tam
    - name: gitops-owner
      type: string
      default: carloseduardoluzf
  workspaces:
    - name: source
  steps:
    - name: clone
      image: alpine/git:2.45.2
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env sh
        set -eu
        rm -rf source
        git clone "$(params.git-url)" source
        cd source
        git checkout "$(params.git-revision)"
    - name: package
      image: maven:3.9.9-eclipse-temurin-21
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env sh
        set -eu
        printf '%s\n' \
          '<settings xmlns="http://maven.apache.org/SETTINGS/1.2.0"' \
          '          xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"' \
          '          xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.2.0 https://maven.apache.org/xsd/settings-1.2.0.xsd">' \
          '</settings>' > maven-settings.xml
        cd source
        chmod +x mvnw
        unset MAVEN_CONFIG
        ./mvnw -B -DskipTests package
    - name: build-and-push
      image: quay.io/buildah/stable:v1.37.0
      workingDir: $(workspaces.source.path)
      securityContext:
        capabilities:
          add:
            - SETFCAP
      script: |
        #!/usr/bin/env sh
        set -eu
        cd source
        IMAGE="$(params.image-registry)/$(params.image-namespace)/$(params.app-name):$(params.image-tag)"
        TOKEN="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
        buildah --storage-driver=vfs login --tls-verify=false -u pipeline -p "${TOKEN}" "$(params.image-registry)"
        buildah --storage-driver=vfs bud --isolation=chroot --tls-verify=false -f src/main/docker/Dockerfile.jvm -t "${IMAGE}" .
        buildah --storage-driver=vfs push --tls-verify=false "${IMAGE}"
    - name: update-gitops
      image: alpine/git:2.45.2
      workingDir: $(workspaces.source.path)
      env:
        - name: GITHUB_USERNAME
          valueFrom:
            secretKeyRef:
              name: github-gitops-credentials
              key: username
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-gitops-credentials
              key: token
      script: |
        #!/usr/bin/env sh
        set -eu
        APP="$(params.app-name)"
        TAG="$(params.image-tag)"
        IMAGE="$(params.image-registry)/$(params.image-namespace)/${APP}:${TAG}"
        GITOPS_REPO="https://github.com/$(params.gitops-owner)/${APP}-gitops.git"

        rm -rf gitops
        printf 'machine github.com\nlogin %s\npassword %s\n' "${GITHUB_USERNAME}" "${GITHUB_TOKEN}" > "${HOME}/.netrc"
        chmod 600 "${HOME}/.netrc"

        git clone "${GITOPS_REPO}" gitops
        cd gitops
        git config user.name "tekton-pipeline"
        git config user.email "tekton-pipeline@desafio-tam.local"
        sed -i "s#image: image-registry.openshift-image-registry.svc:5000/desafio-tam/${APP}:.*#image: ${IMAGE}#" deployment.yaml

        if git diff --quiet -- deployment.yaml; then
          echo "deployment.yaml already points to ${IMAGE}"
          exit 0
        fi

        git add deployment.yaml
        git commit -m "deploy ${APP} ${TAG}"
        git push origin main
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: quarkus-build-and-deploy
  namespace: desafio-tam
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  params:
    - name: git-url
      type: string
    - name: git-revision
      type: string
    - name: app-name
      type: string
    - name: image-tag
      type: string
      default: 1.0.0-SNAPSHOT
  workspaces:
    - name: source
  tasks:
    - name: build-push-rollout
      taskRef:
        name: quarkus-build-push-gitops
      params:
        - name: git-url
          value: $(params.git-url)
        - name: git-revision
          value: $(params.git-revision)
        - name: app-name
          value: $(params.app-name)
        - name: image-tag
          value: $(params.image-tag)
      workspaces:
        - name: source
          workspace: source
