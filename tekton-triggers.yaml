apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: quarkus-github-binding
  namespace: desafio-tam
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  params:
    - name: git-url
      value: $(extensions.git_url)
    - name: git-revision
      value: $(extensions.git_revision)
    - name: app-name
      value: $(extensions.app_name)
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: quarkus-build-template
  namespace: desafio-tam
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  params:
    - name: git-url
    - name: git-revision
    - name: app-name
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: quarkus-$(tt.params.app-name)-
        namespace: desafio-tam
        labels:
          app: $(tt.params.app-name)
      spec:
        taskRunTemplate:
          serviceAccountName: pipeline
        pipelineRef:
          name: quarkus-build-and-deploy
        params:
          - name: git-url
            value: $(tt.params.git-url)
          - name: git-revision
            value: $(tt.params.git-revision)
          - name: app-name
            value: $(tt.params.app-name)
          - name: image-tag
            value: 1.0.0-SNAPSHOT
        workspaces:
          - name: source
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 2Gi
---
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: github-webhook
  namespace: desafio-tam
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  serviceAccountName: pipeline
  triggers:
    - name: github-push-main
      interceptors:
        - ref:
            name: github
          params:
            - name: secretRef
              value:
                secretName: github-webhook-secret
                secretKey: secretToken
            - name: eventTypes
              value:
                - push
        - ref:
            name: cel
          params:
            - name: filter
              value: body.ref == 'refs/heads/main' && (body.repository.name == 'producer' || body.repository.name == 'consumer')
            - name: overlays
              value:
                - key: git_url
                  expression: body.repository.clone_url
                - key: git_revision
                  expression: body.after
                - key: app_name
                  expression: body.repository.name
      bindings:
        - ref: quarkus-github-binding
      template:
        ref: quarkus-build-template
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: github-webhook
  namespace: desafio-tam
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  to:
    kind: Service
    name: el-github-webhook
  port:
    targetPort: http-listener
  tls:
    termination: edge
